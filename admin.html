<script>
const FB_URL = "https://tgsrtc-busgo-default-rtdb.firebaseio.com/searches.json";

async function loadData() {
  const res = await fetch(FB_URL);
  const data = await res.json();

  const list = document.getElementById("data");
  list.innerHTML = "";

  if (!data) {
    list.innerHTML = "No data found";
    return;
  }

  Object.keys(data).forEach(key => {
    const item = data[key];

    const li = document.createElement("li");

    li.innerText =
      "From: " + (item.from || "N/A") +
      " | City: " + (item.city || "N/A") +
      " | Coupon: " + (item.couponCode || "N/A");

    list.appendChild(li);
  });
}
</script>
