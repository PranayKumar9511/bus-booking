<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Bus Search Data</h2>
<button onclick="loadData()">🔄 Refresh</button>

<ul id="data"></ul>

<script>
const FB_URL = "https://tgsrtc-busgo-default-rtdb.firebaseio.com/searches.json";

async function loadData() {
  const res = await fetch(FB_URL);
  const data = await res.json();

  const list = document.getElementById("data");
  list.innerHTML = "";

  for (let key in data) {
    const item = data[key];
    const li = document.createElement("li");
    li.innerText = 
  "From: " + item.from + 
  " | City: " + item.city + 
  " | Coupon: " + item.couponCode;
    list.appendChild(li);
  }
}
</script>

</body>
</html>
